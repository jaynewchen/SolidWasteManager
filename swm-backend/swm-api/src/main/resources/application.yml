server:
  port: 8080

spring:
  application:
    name: swm-api

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # H2 Database (Development - zero install, MySQL compatible mode)
  datasource:
    url: jdbc:h2:file:./data/swm;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 10000

  # H2 Web Console (visit http://localhost:8080/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  sql:
    init:
      encoding: UTF-8
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql
      continue-on-error: true

  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: SWM2026SolidWasteManagerSecretKeyForJWTTokenGeneration256Bit!
  expiration: 86400000

knife4j:
  enable: true
  setting:
    language: zh-CN
